# Синхронизация клона на Windows-сервере с GitHub без ручного захода на машину.
#
# Как включить (один раз):
# 1. На сервере установите «GitHub Actions self-hosted runner» для репозитория parserIT
#    (Settings → Actions → Runners → New self-hosted runner → выберите Windows).
# 2. После `config.cmd` — служба или `run.cmd`; в GitHub → Runners статус Online.
# 3. Права на C:\tender_it для службы (NT AUTHORITY\NETWORK SERVICE): на сервере от админа
#    выполните deploy\grant-networkservice-repo-access.ps1 из клона репозитория.
# 4. Каждый push в ветку main выполнит git pull в каталоге ниже.
#
# Ручной запуск: вкладка Actions → workflow «Sync server from Git» → Run workflow.
#
# Каталог клона можно переопределить при ручном запуске (input) или правкой env ниже.

# If git pull fails quickly: private repo + runner service has no credentials.
# Add Actions secret GH_PULL_PAT (read-only PAT for this repo).

name: Sync server from Git

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      workdir:
        description: Каталог git-клона на сервере (Windows)
        required: false
        default: 'C:\tender_it'

env:
  # Значение по умолчанию для push; при workflow_dispatch подставится input.
  DEFAULT_WORKDIR: 'C:\tender_it'

jobs:
  pull-on-self-hosted:
    name: git pull on Windows host
    runs-on: self-hosted
    steps:
      - name: Resolve directory
        shell: powershell
        run: |
          $d = '${{ github.event.inputs.workdir }}'
          if ([string]::IsNullOrWhiteSpace($d)) { $d = $env:DEFAULT_WORKDIR }
          echo "WORKDIR=$d" >> $env:GITHUB_ENV

      - name: Git pull origin main
        env:
          GH_PULL_PAT: ${{ secrets.GH_PULL_PAT }}
        shell: powershell
        run: |
          if (-not (Test-Path -LiteralPath $env:WORKDIR)) {
            Write-Error "Directory not found: $($env:WORKDIR). Clone the repo or fix path."
            exit 1
          }
          Set-Location -LiteralPath $env:WORKDIR
          $sd = (Get-Location).Path
          $opt = "safe.directory=$sd"
          if ($env:GH_PULL_PAT -and $env:GH_PULL_PAT.Trim().Length -gt 0) {
            $u = "https://x-access-token:$($env:GH_PULL_PAT)@github.com/${{ github.repository }}.git"
            git -c $opt remote set-url origin $u
          }
          git -c $opt fetch origin
          git -c $opt checkout main
          git -c $opt pull origin main
          git -c $opt log -1 --oneline

      - name: pip install (optional)
        shell: powershell
        run: |
          Set-Location -LiteralPath $env:WORKDIR
          if (Test-Path -LiteralPath "requirements.txt") {
            python -m pip install -q -r requirements.txt
          }
