# Run it_parser.py on the Windows self-hosted runner on a schedule (cron is UTC).
# Does not use Windows Task Scheduler.
#
# Needs: runner Online; folder C:\tender_it; git and python on PATH for the runner account.
# Manual: Actions -> "Run tender parser on server" -> Run workflow.
#
# Schedule: twice daily — ~00:00 and ~12:00 Minsk (Belarus, UTC+3): 21:00 and 09:00 UTC.

name: Run tender parser on server

on:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

defaults:
  run:
    shell: powershell

env:
  TENDER_IT_DIR: 'C:\tender_it'

jobs:
  parser:
    runs-on: self-hosted
    steps:
      - name: Git pull main
        run: |
          if (-not (Test-Path -LiteralPath $env:TENDER_IT_DIR)) {
            Write-Error "Directory missing: $($env:TENDER_IT_DIR)"
          }
          Set-Location -LiteralPath $env:TENDER_IT_DIR
          git fetch origin
          git checkout main
          git pull origin main
          git log -1 --oneline

      - name: pip install
        run: |
          Set-Location -LiteralPath $env:TENDER_IT_DIR
          if (Test-Path -LiteralPath 'requirements.txt') {
            python -m pip install -q -r requirements.txt
          }

      - name: Run it_parser.py
        run: |
          Set-Location -LiteralPath $env:TENDER_IT_DIR
          python it_parser.py

      - name: Log schedule completion (UTC) on server
        if: always()
        run: |
          Set-Location -LiteralPath $env:TENDER_IT_DIR
          New-Item -ItemType Directory -Force -Path logs | Out-Null
          $line = ('{0:u} run-parser-on-server job finished (workflow_status={1})' -f [datetime]::UtcNow, '${{ job.status }}')
          Add-Content -LiteralPath (Join-Path $env:TENDER_IT_DIR 'logs\gh-actions-schedule.log') -Value $line
