# То же окружение, что и для ИТ (C:\tender_it, self-hosted Windows runner).
# Расписание: на 1 час позже профиля ИТ — ~01:00 и ~13:00 Минск → 22:00 и 10:00 UTC.
#
name: Run angar parser on server

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

defaults:
  run:
    shell: powershell

env:
  TENDER_IT_DIR: 'C:\tender_it'

jobs:
  parser:
    runs-on: self-hosted
    steps:
      - name: Debug identity and tools
        run: |
          whoami
          (Get-Command git -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source)
          (Get-Command python -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source)

      - name: Git pull main
        env:
          GH_PULL_PAT: ${{ secrets.GH_PULL_PAT }}
        run: |
          if (-not (Test-Path -LiteralPath $env:TENDER_IT_DIR)) {
            Write-Error "Directory missing: $($env:TENDER_IT_DIR)"
          }
          Set-Location -LiteralPath $env:TENDER_IT_DIR
          $sd = (Get-Location).Path
          $opt = "safe.directory=$sd"
          if ($env:GH_PULL_PAT -and $env:GH_PULL_PAT.Trim().Length -gt 0) {
            $u = "https://x-access-token:$($env:GH_PULL_PAT)@github.com/${{ github.repository }}.git"
            git -c $opt remote set-url origin $u
          }
          git -c $opt fetch origin
          git -c $opt checkout main
          git -c $opt pull origin main
          git -c $opt log -1 --oneline

      - name: pip install
        run: |
          Set-Location -LiteralPath $env:TENDER_IT_DIR
          if (Test-Path -LiteralPath 'requirements.txt') {
            python -m pip install -q -r requirements.txt
          }

      - name: Run angar_parser.py
        run: |
          Set-Location -LiteralPath $env:TENDER_IT_DIR
          python angar_parser.py

      - name: Log schedule completion (UTC) on server
        if: always()
        run: |
          Set-Location -LiteralPath $env:TENDER_IT_DIR
          New-Item -ItemType Directory -Force -Path logs | Out-Null
          $rid = '${{ github.run_id }}'
          $line = ('{0:u} run-angar-parser-on-server finished run_id={1}' -f [datetime]::UtcNow, $rid)
          Add-Content -LiteralPath (Join-Path $env:TENDER_IT_DIR 'logs\gh-actions-schedule-angar.log') -Value $line
